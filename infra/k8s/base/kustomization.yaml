apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Todos os recursos herdam este namespace (exceto o proprio Namespace).
namespace: conexao-solidaria

resources:
  - namespace.yaml
  # Dados (StatefulSet/PVC).
  - postgres.yaml
  - rabbitmq.yaml
  - elasticsearch.yaml
  # Migracoes de schema (rodam ANTES dos deployments; ver migrations-job.yaml).
  - migrations-job.yaml
  # Aplicacao (.NET).
  - identity-api.yaml
  - campaigns-api.yaml
  - donations-worker.yaml
  - gateway.yaml
  - web.yaml
  # Observabilidade / monitoramento.
  - observability.yaml
  # Dashboards ricos do Grafana (gerado de infra/grafana/dashboards/*.json).
  - grafana-dashboards.yaml
  - zabbix.yaml
  # Rede e resiliencia.
  - ingress.yaml
  - network-policies.yaml
  - pdb.yaml
  - hpa.yaml

# NOTA: o Secret "conexao-solidaria-secret" NAO e versionado (sem segredos no Git).
# Aplique-o antes do apply da base, a partir de infra/k8s/secret.example.yaml.
