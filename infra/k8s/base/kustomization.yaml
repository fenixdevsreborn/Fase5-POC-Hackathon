apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Todos os recursos herdam este namespace (exceto o proprio Namespace).
namespace: conexao-solidaria

resources:
  - namespace.yaml
  # Dados (StatefulSet/PVC).
  - postgres.yaml
  - rabbitmq.yaml
  - elasticsearch.yaml
  # Migracoes de schema (rodam ANTES dos deployments; ver migrations-job.yaml).
  - migrations-job.yaml
  # Aplicacao (.NET).
  - identity-api.yaml
  - campaigns-api.yaml
  - donations-worker.yaml
  - gateway.yaml
  - web.yaml
  # Observabilidade / monitoramento.
  - observability.yaml
  # Dashboards ricos do Grafana (gerado de infra/grafana/dashboards/*.json).
  - grafana-dashboards.yaml
  - zabbix.yaml
  # Rede e resiliencia.
  - ingress.yaml
  - network-policies.yaml
  - pdb.yaml
  - hpa.yaml

# NOTA: o Secret "conexao-solidaria-secret" NAO e versionado (sem segredos no Git).
# Aplique-o antes do apply da base, a partir de infra/k8s/secret.example.yaml.

# NOTA: base/web-dataprotection-pvc.yaml esta FORA desta lista de proposito.
# Dentro do overlay, o `kubectl delete -k` do down.ps1 apagaria o key ring do
# Data Protection a cada ciclo down/up, invalidando os JWTs ja gravados no
# localStorage dos browsers. O up.ps1 aplica esse PVC separadamente.

# NOTA: base/campaigns-images-pvc.yaml tambem esta FORA desta lista, pelo mesmo
# motivo: no overlay, cada down/up apagaria as imagens enviadas pelos gestores e
# as campanhas ja criadas ficariam com fotos quebradas. O up.ps1 o aplica a parte.
