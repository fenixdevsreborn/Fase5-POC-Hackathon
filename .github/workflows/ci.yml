# CI/CD do Conexao Solidaria (Fase 6)
# Pipeline multi-job: qualidade -> testes -> containers/k8s -> publish (GHCR).
# .NET 10 / Aspire. Solucao: ConexaoSolidaria.slnx.
name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# Permissoes minimas: ler o repo e escrever pacotes/imagens (GHCR) no job publish.
permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION: ConexaoSolidaria.slnx
  # Desliga telemetria/first-run do SDK para builds mais rapidos e limpos no CI.
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  # ---------------------------------------------------------------------------
  # 1) QUALITY: restore + format (report-only) + scan de vulnerabilidades + build
  # ---------------------------------------------------------------------------
  quality:
    name: Quality (build + lint + scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          # Cache do NuGet baseado nos arquivos de projeto/lock.
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      # Formatacao: NAO bloqueia (codigo gerado pode nao estar 100% formatado).
      - name: Format check (report-only)
        continue-on-error: true
        run: dotnet format ${{ env.SOLUTION }} --verify-no-changes

      # Scan de vulnerabilidades: report-only. Ha 1 vuln transitiva conhecida
      # (MessagePack via Aspire no AppHost) que NAO pode falhar o pipeline.
      - name: Vulnerability scan (report-only)
        continue-on-error: true
        run: dotnet list ${{ env.SOLUTION }} package --vulnerable --include-transitive

      - name: Build (Release)
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

  # ---------------------------------------------------------------------------
  # 2) TESTS: unit + integracao (Testcontainers usa o Docker do runner)
  # ---------------------------------------------------------------------------
  tests:
    name: Tests (unit + integration)
    needs: quality
    runs-on: ubuntu-latest
    # Timeout generoso: os testes de integracao sobem containers (pode ser lento).
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      # Roda unit + integracao. O runner ubuntu-latest ja tem Docker/Testcontainers.
      - name: Test (com coverage)
        run: >-
          dotnet test ${{ env.SOLUTION }}
          -c Release
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      # Publica resultados + cobertura mesmo se algum teste falhar.
      - name: Upload test results & coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./TestResults
          retention-days: 14
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 3) CONTAINERS: build (sem push) das 5 imagens em matrix, com cache do GHA
  # ---------------------------------------------------------------------------
  containers:
    name: Container build (${{ matrix.service }})
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-api
            dockerfile: src/ConexaoSolidaria.Identity.Api/Dockerfile
          - service: campaigns-api
            dockerfile: src/ConexaoSolidaria.Campaigns.Api/Dockerfile
          - service: donations-worker
            dockerfile: src/ConexaoSolidaria.Donations.Worker/Dockerfile
          - service: gateway
            dockerfile: src/ConexaoSolidaria.Gateway/Dockerfile
          - service: web
            dockerfile: src/ConexaoSolidaria.Web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # Apenas build (push: false). Contexto na raiz; -f aponta o Dockerfile.
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: conexao-solidaria-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # 4) KUBERNETES-VALIDATION: renderiza o overlay local e valida os manifests
  # ---------------------------------------------------------------------------
  kubernetes-validation:
    name: Kubernetes manifests validation
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install kustomize & kubeconform
        run: |
          set -euo pipefail
          # kustomize
          curl -sSfL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version
          # kubeconform
          curl -sSfL "https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz" -o kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      # O kustomize build DEVE passar (renderiza sem erro).
      - name: Render overlay (kustomize build)
        run: kustomize build infra/k8s/overlays/local > rendered.yaml

      # Validacao de schema: report-only (CRDs/recursos custom podem nao ter schema).
      - name: Validate manifests (kubeconform, report-only)
        continue-on-error: true
        run: |
          kubeconform -strict -summary -ignore-missing-schemas rendered.yaml

  # ---------------------------------------------------------------------------
  # 5) PUBLISH: rebuild + push das 5 imagens para o GHCR (apenas em main)
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to GHCR (${{ matrix.service }})
    needs: [tests, containers]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-api
            dockerfile: src/ConexaoSolidaria.Identity.Api/Dockerfile
          - service: campaigns-api
            dockerfile: src/ConexaoSolidaria.Campaigns.Api/Dockerfile
          - service: donations-worker
            dockerfile: src/ConexaoSolidaria.Donations.Worker/Dockerfile
          - service: gateway
            dockerfile: src/ConexaoSolidaria.Gateway/Dockerfile
          - service: web
            dockerfile: src/ConexaoSolidaria.Web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # owner em minusculas (GHCR exige repositorio/owner lowercase).
      - name: Compute lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push (SHA + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/conexao-solidaria-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.value }}/conexao-solidaria-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
